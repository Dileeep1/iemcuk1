version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: iemcuk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/iemcuk
      SMTP_HOST: smtp.example.com
      SMTP_PORT: 587
      SMTP_USER: hello@example.com
      SMTP_PASS: changeme
      SMTP_FROM: IEMCUK <hello@iemcuk.com>
      SALES_EMAIL: admissions@iemcuk.com
      WHATSAPP_NUMBER: 447000000000
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_WHATSAPP_NUMBER: 447000000000
      NEXT_PUBLIC_GA_ID: G-XXXXXXXXXX
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
